version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    groups:
      angular:
        patterns:
          - "@angular*"
      frontend-runtime:
        dependency-type: production
      frontend-dev:
        dependency-type: development

  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    groups:
      backend-runtime:
        dependency-type: production
      backend-dev:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
